version: "3.9"

# ─── shared networking ────────────────────────────────────────────────────────
networks:
  weighstream:
    driver: bridge

# ─── named volumes ────────────────────────────────────────────────────────────
volumes:
  minio-data:
  postgres-data:
  airflow-logs:

# ─── services ─────────────────────────────────────────────────────────────────
services:

  # ── Kafka (KRaft, no ZooKeeper) ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: weighstream-kafka
    networks: [weighstream]
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "Qhf6Mn1nRsGxInR8KqeJ8w"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── MinIO (S3-compatible object store for Iceberg) ────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    container_name: weighstream-minio
    networks: [weighstream]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-04-06T05-26-02Z
    container_name: weighstream-minio-init
    networks: [weighstream]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/warehouse &&
        mc mb --ignore-existing local/checkpoints &&
        echo 'MinIO buckets ready'
      "
    restart: "no"

  # ── Iceberg REST catalog ───────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:0.10.0
    container_name: weighstream-iceberg-rest
    networks: [weighstream]
    ports:
      - "8181:8181"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Apache Flink ───────────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.19-scala_2.12-java11
    container_name: weighstream-flink-jm
    networks: [weighstream]
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: s3://checkpoints/flink
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
    volumes:
      - ./flink/lib:/opt/flink/lib/extra:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 10

  flink-taskmanager:
    image: flink:1.19-scala_2.12-java11
    container_name: weighstream-flink-tm
    networks: [weighstream]
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.checkpoints.dir: s3://checkpoints/flink
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
    volumes:
      - ./flink/lib:/opt/flink/lib/extra:ro

  # ── Trino ─────────────────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:446
    container_name: weighstream-trino
    networks: [weighstream]
    ports:
      - "8080:8080"
    depends_on:
      iceberg-rest:
        condition: service_healthy
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Postgres (Airflow metadata) ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: weighstream-postgres
    networks: [weighstream]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow (init, webserver, scheduler) ──────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: weighstream-airflow-init
    networks: [weighstream]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: weighstream-airflow-web
    networks: [weighstream]
    ports:
      - "8082:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      trino:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      TRINO_HOST: trino
      TRINO_PORT: "8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./dbt:/opt/dbt:ro
      - airflow-logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: weighstream-airflow-sched
    networks: [weighstream]
    depends_on:
      airflow-webserver:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      TRINO_HOST: trino
      TRINO_PORT: "8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./dbt:/opt/dbt:ro
      - airflow-logs:/opt/airflow/logs
    command: scheduler

  # ── Scale-device producer ─────────────────────────────────────────────────
  producer:
    build: ./producer
    container_name: weighstream-producer
    networks: [weighstream]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: weigh.readings.raw
      EMIT_RATE_HZ: "10"
      DUPE_RATE: "0.05"
    profiles: ["seed"]  # only start with `docker compose --profile seed up`

  # ── Streamlit dashboard ───────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: weighstream-dashboard
    networks: [weighstream]
    ports:
      - "8501:8501"
    depends_on:
      trino:
        condition: service_healthy
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: gold
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 10s
      retries: 5
